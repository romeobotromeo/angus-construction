services:
  - type: web
    name: angus-construction
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: OWNER_PHONE
        sync: false
      - key: NAOMI_PHONE
        sync: false
      - key: OWNER_PASS
        sync: false
      - key: INVESTOR_PASS
        sync: false
      - key: SESSION_SECRET
        sync: false
